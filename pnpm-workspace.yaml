# Native dependencies whose install scripts must run to build their binaries.
# pnpm 10+ blocks build scripts by default; each must be allowlisted here.
onlyBuiltDependencies:
  - esbuild
  - sharp
  - unrs-resolver
# Don't treat un-built dependencies as a hard error. pnpm makes this fatal under
# CI=true (as on Vercel); we keep it a warning so a stale build cache or the
# machine-local rc below can't fail the install.
strictDepBuilds: false
# A global ~/.config/pnpm/rc (only-built-dependencies=muhammara) restricts builds
# on this machine and trips pnpm 11's pre-run deps check. Skip that gate locally;
# on Vercel the deps build normally from the allowlist above.
verifyDepsBeforeRun: false
